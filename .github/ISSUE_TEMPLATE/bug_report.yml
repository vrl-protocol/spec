name: Bug Report
description: Report a bug in VRL specification, SDKs, or verifier
title: "[BUG] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please provide as much detail as possible.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Specification (SPEC.md)
        - Python SDK (sdk/python)
        - TypeScript SDK (sdk/typescript)
        - Go SDK (sdk/go)
        - Reference Verifier (verifier/)
        - Circuit Registry (registry/)
        - Documentation (docs/)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the bug? What did you expect to happen?
      placeholder: Clear description of the issue
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. First step
        2. Second step
        3. Expected result
        4. Actual result
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your setup details
      placeholder: |
        - OS: [e.g. Ubuntu 22.04]
        - Python version: [e.g. 3.11]
        - Node version: [e.g. 20.0]
        - Go version: [e.g. 1.21]
        - SDK version: [e.g. 0.1.0]

  - type: textarea
    id: logs
    attributes:
      label: Logs and Error Messages
      description: Any error messages or relevant logs
      render: bash

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context that might be helpful
      placeholder: Add any other context about the problem here

  - type: checkboxes
    id: checklist
    attributes:
      label: Verification Checklist
      options:
        - label: I have searched for similar issues
          required: true
        - label: I have verified this against the latest version
          required: true
        - label: I have provided all necessary information
          required: true
